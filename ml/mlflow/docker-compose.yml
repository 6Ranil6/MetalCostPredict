version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mlflow_db
    restart: always
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mlflowdb
    ports:
      - "5431:5432"
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflowdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: mlflow_minio
    restart: always
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - mlflow_minio_data:/data
    command: server /data --console-address ":9001"

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_HTTP_X_FORWARDED_HOST=mlflow,localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
      pip install psycopg2-binary boto3 &&
      mlflow server 
      --backend-store-uri postgresql://mlflow:password@db:5432/mlflowdb
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000"

volumes:
  mlflow_db_data:
    external: true
    name: ml-flow-stack_mlflow_db_data
  mlflow_minio_data:
    external: true
    name: ml-flow-stack_mlflow_minio_data
